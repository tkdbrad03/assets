<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BM&C Enterprise LLC – Freight Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #CC2228;
    --blue: #003087;
    --white: #F5F2EC;
    --dark: #0D0D0D;
    --gray: #888;
    --light-gray: #E8E4DC;
    --gold: #C8A84B;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--blue);
    border-bottom: 4px solid var(--red);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--white);
    display: flex; align-items: center; gap: 10px;
  }
  .logo span { color: var(--red); }
  .logo-badge {
    background: var(--red);
    color: white;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 1px;
  }
  .header-right {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    text-align: right;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: #111;
    border-bottom: 2px solid #222;
  }
  .tab {
    padding: 14px 22px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--gray);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .tab.active { color: var(--white); border-bottom-color: var(--red); }
  .tab:hover:not(.active) { color: #bbb; }

  /* PANELS */
  .panel { display: none; padding: 24px; }
  .panel.active { display: block; }

  /* SUMMARY CARDS */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .card {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-top: 3px solid var(--blue);
    padding: 16px;
    border-radius: 2px;
  }
  .card.red { border-top-color: var(--red); }
  .card.gold { border-top-color: var(--gold); }
  .card-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .card-value {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 28px;
    color: var(--white);
    line-height: 1;
  }
  .card-value.money { color: var(--gold); }

  /* SECTION HEADERS */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--white);
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 4px; height: 18px;
    background: var(--red);
    border-radius: 1px;
  }

  /* FORM */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    background: #161616;
    border: 1px solid #2a2a2a;
    padding: 20px;
    border-radius: 2px;
    margin-bottom: 24px;
  }
  .form-grid.triple { grid-template-columns: 1fr 1fr 1fr; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.full { grid-column: 1 / -1; }
  label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--gray);
    text-transform: uppercase;
  }
  input, select, textarea {
    background: #0D0D0D;
    border: 1px solid #333;
    color: var(--white);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 9px 12px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--blue); }
  select option { background: #1a1a1a; }
  textarea { resize: vertical; min-height: 60px; }

  /* BUTTONS */
  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 11px 20px;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--red); color: white; }
  .btn-primary:hover { background: #a81b20; }
  .btn-secondary { background: var(--blue); color: white; }
  .btn-secondary:hover { background: #002070; }
  .btn-ghost { background: transparent; color: var(--gray); border: 1px solid #333; }
  .btn-ghost:hover { color: var(--white); border-color: #555; }
  .btn-sm { padding: 6px 12px; font-size: 10px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { border-bottom: 2px solid var(--red); }
  th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gray);
    padding: 10px 12px;
    text-align: left;
  }
  td { padding: 12px; border-bottom: 1px solid #1e1e1e; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #151515; }
  .money-cell { font-family: 'IBM Plex Mono', monospace; color: var(--gold); font-weight: 600; }
  .miles-cell { font-family: 'IBM Plex Mono', monospace; color: #7ab3ff; }
  .date-cell { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--gray); }

  /* BADGE */
  .badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 3px 7px;
    border-radius: 2px;
    text-transform: uppercase;
  }
  .badge-round { background: rgba(0,48,135,0.3); color: #7ab3ff; border: 1px solid #003087; }
  .badge-one { background: rgba(204,34,40,0.2); color: #ff7a7d; border: 1px solid #cc2228; }

  /* INVOICE */
  .invoice-box {
    background: var(--white);
    color: var(--dark);
    padding: 40px;
    max-width: 680px;
    border-radius: 2px;
    font-family: 'IBM Plex Sans', sans-serif;
  }
  .inv-header { display: flex; justify-content: space-between; margin-bottom: 32px; align-items: flex-start; }
  .inv-logo { font-family: 'Black Han Sans', sans-serif; font-size: 26px; color: var(--blue); }
  .inv-logo span { color: var(--red); }
  .inv-number { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #666; text-align: right; }
  .inv-number strong { display: block; font-size: 20px; color: var(--dark); margin-bottom: 4px; }
  .inv-divider { height: 3px; background: linear-gradient(90deg, var(--red) 40%, var(--blue) 40%); margin-bottom: 28px; }
  .inv-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .inv-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #888; font-family: 'IBM Plex Mono', monospace; margin-bottom: 6px; }
  .inv-name { font-weight: 600; font-size: 15px; }
  .inv-sub { font-size: 13px; color: #555; line-height: 1.6; }
  .inv-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  .inv-table th { background: var(--blue); color: white; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 10px 12px; text-align: left; }
  .inv-table td { padding: 11px 12px; border-bottom: 1px solid #eee; font-size: 13px; }
  .inv-table tr:last-child td { border-bottom: none; }
  .inv-total { display: flex; justify-content: flex-end; }
  .inv-total-box { background: var(--blue); color: white; padding: 16px 24px; border-radius: 2px; text-align: right; }
  .inv-total-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px; opacity: 0.7; }
  .inv-total-amt { font-family: 'Black Han Sans', sans-serif; font-size: 28px; }
  .inv-footer { margin-top: 28px; border-top: 1px solid #ddd; padding-top: 16px; font-size: 11px; color: #888; text-align: center; font-family: 'IBM Plex Mono', monospace; }
  .inv-paid { display: inline-block; border: 3px solid green; color: green; font-family: 'Black Han Sans', sans-serif; font-size: 36px; padding: 4px 16px; transform: rotate(-8deg); opacity: 0.4; position: absolute; top: 60px; right: 60px; }

  /* FILTER BAR */
  .filter-bar {
    display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
  }
  .filter-bar input, .filter-bar select { flex: 1; min-width: 120px; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--gray);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }

  /* PRINT */
  @media print {
    body { background: white; }
    header, .tabs, .panel:not(.active), .filter-bar, .btn, .cards { display: none !important; }
    .invoice-box { box-shadow: none; }
  }

  @media (max-width: 600px) {
    .form-grid, .form-grid.triple { grid-template-columns: 1fr; }
    .field.full { grid-column: 1; }
    .inv-parties { grid-template-columns: 1fr; }
    .inv-header { flex-direction: column; gap: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    BM&amp;C <span style="color:var(--gold);margin-left:6px">Enterprise</span>
    <div class="logo-badge">LLC</div>
  </div>
  <div class="header-right">
    FREIGHT MANAGEMENT SYSTEM<br>
    <span id="live-date"></span>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('dashboard')">📊 Dashboard</div>
  <div class="tab" onclick="switchTab('add-load')">➕ Log Load</div>
  <div class="tab" onclick="switchTab('loads')">🚛 All Loads</div>
  <div class="tab" onclick="switchTab('invoice')">🧾 Invoice</div>
</div>

<!-- DASHBOARD -->
<div class="panel active" id="tab-dashboard">
  <div class="cards" id="summary-cards"></div>

  <div class="section-header">
    <div class="section-title">Recent Activity</div>
  </div>
  <div class="table-wrap">
    <table id="recent-table">
      <thead>
        <tr>
          <th>Date</th><th>From</th><th>To</th><th>Miles</th><th>Amount</th><th>Type</th>
        </tr>
      </thead>
      <tbody id="recent-body"></tbody>
    </table>
  </div>
</div>

<!-- ADD LOAD -->
<div class="panel" id="tab-add-load">
  <div class="section-header">
    <div class="section-title">Log New Load</div>
  </div>
  <div class="form-grid">
    <div class="field">
      <label>Date</label>
      <input type="date" id="f-date">
    </div>
    <div class="field">
      <label>Trip Type</label>
      <select id="f-type">
        <option value="one-way">One-Way</option>
        <option value="round-trip">Round Trip</option>
      </select>
    </div>
    <div class="field">
      <label>Pickup City / Location</label>
      <input type="text" id="f-from" placeholder="e.g. Lawrence">
    </div>
    <div class="field">
      <label>Delivery City / Location</label>
      <input type="text" id="f-to" placeholder="e.g. Piedmont">
    </div>
    <div class="field">
      <label>Miles Driven</label>
      <input type="number" id="f-miles" placeholder="0" min="0">
    </div>
    <div class="field">
      <label>Amount Paid ($)</label>
      <input type="number" id="f-amount" placeholder="0.00" step="0.01" min="0">
    </div>
    <div class="field">
      <label>Client / Broker</label>
      <input type="text" id="f-client" placeholder="Who hired you?">
    </div>
    <div class="field">
      <label>BOL #</label>
      <input type="text" id="f-bol" placeholder="Bill of Lading number">
    </div>
    <div class="field full">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Any extra details about this load..."></textarea>
    </div>
  </div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-primary" onclick="addLoad()">✔ Save Load</button>
    <button class="btn btn-ghost" onclick="clearForm()">Clear</button>
  </div>
  <div id="form-msg" style="margin-top:14px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold)"></div>
</div>

<!-- ALL LOADS -->
<div class="panel" id="tab-loads">
  <div class="section-header">
    <div class="section-title">All Loads</div>
    <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
  </div>
  <div class="filter-bar">
    <input type="text" id="search-input" placeholder="Search client, city..." oninput="renderLoads()">
    <select id="filter-type" onchange="renderLoads()">
      <option value="">All Types</option>
      <option value="one-way">One-Way</option>
      <option value="round-trip">Round Trip</option>
    </select>
    <input type="month" id="filter-month" onchange="renderLoads()">
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Date</th><th>From</th><th>To</th><th>Client</th><th>BOL</th><th>Miles</th><th>Amount</th><th>Type</th><th></th>
        </tr>
      </thead>
      <tbody id="loads-body"></tbody>
    </table>
  </div>
</div>

<!-- INVOICE -->
<div class="panel" id="tab-invoice">
  <div class="section-header">
    <div class="section-title">Generate Invoice</div>
  </div>
  <div class="form-grid triple">
    <div class="field">
      <label>Bill To (Client)</label>
      <input type="text" id="inv-client" placeholder="Client name or company">
    </div>
    <div class="field">
      <label>Invoice #</label>
      <input type="text" id="inv-number" placeholder="e.g. BM&C-001">
    </div>
    <div class="field">
      <label>Invoice Date</label>
      <input type="date" id="inv-date">
    </div>
    <div class="field">
      <label>Period Start</label>
      <input type="date" id="inv-start" onchange="filterInvoiceLoads()">
    </div>
    <div class="field">
      <label>Period End</label>
      <input type="date" id="inv-end" onchange="filterInvoiceLoads()">
    </div>
    <div class="field" style="display:flex;align-items:flex-end">
      <button class="btn btn-secondary" onclick="generateInvoice()" style="width:100%">Generate</button>
    </div>
  </div>

  <div id="invoice-output" style="margin-top:24px"></div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let loads = JSON.parse(localStorage.getItem('bm_c_loads') || '[]');

function save() {
  localStorage.setItem('bm_c_loads', JSON.stringify(loads));
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  document.getElementById('f-date').value = today();
  document.getElementById('inv-date').value = today();
  document.getElementById('inv-number').value = 'BM&C-' + String(loads.length + 1).padStart(3, '0');
  document.getElementById('live-date').textContent = new Date().toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'numeric'});
  renderDashboard();
  renderLoads();
};

function today() {
  return new Date().toISOString().split('T')[0];
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const panels = ['dashboard','add-load','loads','invoice'];
  const idx = panels.indexOf(id);
  document.querySelectorAll('.tab')[idx].classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if (id === 'dashboard') renderDashboard();
  if (id === 'loads') renderLoads();
}

// ─── ADD LOAD ─────────────────────────────────────────────────────────────────
function addLoad() {
  const load = {
    id: Date.now(),
    date: document.getElementById('f-date').value,
    type: document.getElementById('f-type').value,
    from: document.getElementById('f-from').value.trim(),
    to: document.getElementById('f-to').value.trim(),
    miles: parseFloat(document.getElementById('f-miles').value) || 0,
    amount: parseFloat(document.getElementById('f-amount').value) || 0,
    client: document.getElementById('f-client').value.trim(),
    bol: document.getElementById('f-bol').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    invoiced: false
  };
  if (!load.date || !load.from || !load.to || !load.amount) {
    document.getElementById('form-msg').textContent = '⚠ Date, From, To, and Amount are required.';
    document.getElementById('form-msg').style.color = 'var(--red)';
    return;
  }
  loads.unshift(load);
  save();
  document.getElementById('form-msg').textContent = '✔ Load saved!';
  document.getElementById('form-msg').style.color = 'var(--gold)';
  setTimeout(() => document.getElementById('form-msg').textContent = '', 3000);
  clearForm();
}

function clearForm() {
  ['f-from','f-to','f-miles','f-amount','f-client','f-bol','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-date').value = today();
  document.getElementById('f-type').value = 'one-way';
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard() {
  const thisMonth = loads.filter(l => l.date && l.date.startsWith(new Date().toISOString().slice(0,7)));
  const totalMiles = loads.reduce((s,l) => s + l.miles, 0);
  const totalEarned = loads.reduce((s,l) => s + l.amount, 0);
  const monthEarned = thisMonth.reduce((s,l) => s + l.amount, 0);

  document.getElementById('summary-cards').innerHTML = `
    <div class="card"><div class="card-label">Total Loads</div><div class="card-value">${loads.length}</div></div>
    <div class="card red"><div class="card-label">This Month</div><div class="card-value">${thisMonth.length} loads</div></div>
    <div class="card gold"><div class="card-label">Month Earned</div><div class="card-value money">$${monthEarned.toLocaleString('en-US',{minimumFractionDigits:2})}</div></div>
    <div class="card gold"><div class="card-label">Total Earned</div><div class="card-value money">$${totalEarned.toLocaleString('en-US',{minimumFractionDigits:2})}</div></div>
    <div class="card"><div class="card-label">Total Miles</div><div class="card-value">${totalMiles.toLocaleString()}</div></div>
  `;

  const tbody = document.getElementById('recent-body');
  const recent = loads.slice(0, 10);
  if (!recent.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="empty-icon">🚛</div>No loads logged yet. Go log your first load!</div></td></tr>`;
    return;
  }
  tbody.innerHTML = recent.map(l => `
    <tr>
      <td class="date-cell">${fmtDate(l.date)}</td>
      <td>${l.from}</td>
      <td>${l.to}</td>
      <td class="miles-cell">${l.miles ? l.miles.toLocaleString()+' mi' : '—'}</td>
      <td class="money-cell">$${l.amount.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
      <td><span class="badge ${l.type === 'round-trip' ? 'badge-round' : 'badge-one'}">${l.type}</span></td>
    </tr>
  `).join('');
}

// ─── ALL LOADS ────────────────────────────────────────────────────────────────
function renderLoads() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const typeF = document.getElementById('filter-type').value;
  const monthF = document.getElementById('filter-month').value;

  let filtered = loads.filter(l => {
    const match = !search || [l.from,l.to,l.client,l.bol,l.notes].join(' ').toLowerCase().includes(search);
    const typeMatch = !typeF || l.type === typeF;
    const monthMatch = !monthF || (l.date && l.date.startsWith(monthF));
    return match && typeMatch && monthMatch;
  });

  const tbody = document.getElementById('loads-body');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty"><div class="empty-icon">📋</div>No loads found.</div></td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(l => `
    <tr>
      <td class="date-cell">${fmtDate(l.date)}</td>
      <td>${l.from}</td>
      <td>${l.to}</td>
      <td>${l.client || '—'}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px">${l.bol || '—'}</td>
      <td class="miles-cell">${l.miles ? l.miles.toLocaleString()+' mi' : '—'}</td>
      <td class="money-cell">$${l.amount.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
      <td><span class="badge ${l.type === 'round-trip' ? 'badge-round' : 'badge-one'}">${l.type}</span></td>
      <td><button class="btn btn-ghost btn-sm" onclick="deleteLoad(${l.id})">✕</button></td>
    </tr>
  `).join('');
}

function deleteLoad(id) {
  if (!confirm('Delete this load?')) return;
  loads = loads.filter(l => l.id !== id);
  save();
  renderLoads();
  renderDashboard();
}

// ─── CSV EXPORT ───────────────────────────────────────────────────────────────
function exportCSV() {
  const headers = ['Date','From','To','Client','BOL','Miles','Amount','Type','Notes'];
  const rows = loads.map(l => [l.date,l.from,l.to,l.client,l.bol,l.miles,l.amount,l.type,l.notes].map(v => `"${v||''}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'BM&C_Loads_' + today() + '.csv';
  a.click();
}

// ─── INVOICE ──────────────────────────────────────────────────────────────────
function generateInvoice() {
  const client = document.getElementById('inv-client').value.trim() || 'Client';
  const invNum = document.getElementById('inv-number').value.trim() || 'BM&C-001';
  const invDate = document.getElementById('inv-date').value;
  const start = document.getElementById('inv-start').value;
  const end = document.getElementById('inv-end').value;

  let selected = loads;
  if (start) selected = selected.filter(l => l.date >= start);
  if (end) selected = selected.filter(l => l.date <= end);
  if (client && client !== 'Client') selected = selected.filter(l => l.client.toLowerCase().includes(client.toLowerCase()));

  if (!selected.length) {
    document.getElementById('invoice-output').innerHTML = `<p style="color:var(--gray);font-family:'IBM Plex Mono',monospace;font-size:12px">No loads match these filters for the invoice.</p>`;
    return;
  }

  const total = selected.reduce((s,l) => s + l.amount, 0);
  const totalMiles = selected.reduce((s,l) => s + l.miles, 0);

  const rows = selected.map(l => `
    <tr>
      <td>${fmtDate(l.date)}</td>
      <td>${l.from} → ${l.to}</td>
      <td>${l.bol || '—'}</td>
      <td style="font-family:'IBM Plex Mono',monospace">${l.miles ? l.miles.toLocaleString()+' mi' : '—'}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-weight:600;text-align:right">$${l.amount.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
    </tr>
  `).join('');

  const period = start && end ? `${fmtDate(start)} – ${fmtDate(end)}` : start ? `From ${fmtDate(start)}` : end ? `Through ${fmtDate(end)}` : 'All Dates';

  document.getElementById('invoice-output').innerHTML = `
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="window.print()">🖨 Print Invoice</button>
      <button class="btn btn-ghost" onclick="document.getElementById('invoice-output').innerHTML=''">✕ Clear</button>
    </div>
    <div class="invoice-box" id="printable-invoice" style="position:relative">
      <div class="inv-header">
        <div>
          <div class="inv-logo">BM&amp;C Enterprise LLC</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#555;margin-top:4px">General Freight Carrier</div>
        </div>
        <div class="inv-number">
          <strong>INVOICE</strong>
          ${invNum}<br>
          Date: ${fmtDate(invDate)}<br>
          Period: ${period}
        </div>
      </div>
      <div class="inv-divider"></div>
      <div class="inv-parties">
        <div>
          <div class="inv-label">From</div>
          <div class="inv-name">BM&C Enterprise LLC</div>
          <div class="inv-sub">General Freight Carrier</div>
        </div>
        <div>
          <div class="inv-label">Bill To</div>
          <div class="inv-name">${client}</div>
          <div class="inv-sub">&nbsp;</div>
        </div>
      </div>
      <table class="inv-table">
        <thead>
          <tr><th>Date</th><th>Route</th><th>BOL #</th><th>Miles</th><th style="text-align:right">Amount</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="display:flex;justify-content:space-between;align-items:flex-end">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#888">
          Total Loads: ${selected.length}<br>
          ${totalMiles ? 'Total Miles: '+totalMiles.toLocaleString() : ''}
        </div>
        <div class="inv-total-box">
          <div class="inv-total-label">TOTAL DUE</div>
          <div class="inv-total-amt">$${total.toLocaleString('en-US',{minimumFractionDigits:2})}</div>
        </div>
      </div>
      <div class="inv-footer">
        BM&C Enterprise LLC &nbsp;|&nbsp; General Freight &nbsp;|&nbsp; Thank you for your business
      </div>
    </div>
  `;
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${m}/${day}/${y}`;
}
</script>
